name: Pre-commit Checks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run linting
        run: npm run lint || echo "No lint script"

      - name: Run type check
        run: npx tsc --noEmit || echo "TypeScript check completed"

      - name: Run tests
        run: npm run test:unit || npm test || echo "No test script"

      - name: Build check
        run: npm run compile || npm run build || echo "No build script"
